name: Update Starred Repositories

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-starred:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch starred repos and update README
        uses: actions/github-script@v7
        with:
          script: |
            const { data: starred } = await github.rest.activity.listReposStarredByUser({
              username: context.repo.owner,
              per_page: 6,
              sort: 'created',
              direction: 'desc'
            });

            const sanitize = (str) => (str || '').replace(/\|/g, '\\|');

            const rows = starred.map(repo =>
              `| [${repo.full_name}](${repo.html_url}) | ${sanitize(repo.description)} | ${repo.language || ''} | ⭐ ${repo.stargazers_count} |`
            ).join('\n');

            const table = `| Repository | Description | Language | Stars |\n|---|---|---|---|\n${rows}`;

            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!-- STARRED_REPOS_START -->[\s\S]*?<!-- STARRED_REPOS_END -->/,
              `<!-- STARRED_REPOS_START -->\n${table}\n<!-- STARRED_REPOS_END -->`
            );
            fs.writeFileSync('README.md', readme);

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update starred repositories"
          git push
